<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description | default: 'Notes on software engineering and focused writing by Fehmi Can Saglam.' }}">
  <title>{{ page.title | xml_escape }} - Fehmi Can Saglam</title>
  <link rel="alternate" type="application/atom+xml" href="/atom.xml" title="Fehmi Can Saglam feed">
  <link rel="stylesheet" href="/assets/site.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="/">Fehmi Can Saglam.</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/">Home</a>
        <a href="/ben.html">About</a>
        <a href="/atom.xml">RSS</a>
      </nav>
    </div>
  </header>

  <main class="container page-main">
    <article class="page-card">
      <h1 class="page-title">{{ page.title | xml_escape }}</h1>
      <div class="post-content">{{ content }}</div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <span class="fcs-chip">FCS</span>
      <p>Minimal writing on engineering and life.</p>
    </div>
  </footer>
</body>
</html>
